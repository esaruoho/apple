name: "Move Selected Finder Items with Replacement into Movies folder"
scope: "com.apple.finder"
description: "Move the items selected in the Finder into the Movies folder, replacing existing items with the same name. The moved items will highlighted after moving."
source_library: "Workspace"
source_file: "Selection-MoveWithReplacementToMoviesFolder.scpt"
siri_phrases:
  - "move this with replacement to [the] movies [folder]"
  - "move this with replacement into [the] movies [folder]"
  - "move these with replacement to [the] movies [folder]"
  - "move these with replacement into [the] movies [folder]"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to moveFinderSelectionIntoMoviesFolder(true,true)
