name: "Apply a Magic Move Transition"
scope: "com.apple.iWork.Keynote"
description: "Apply a Magic Move transition of 2-seconds to the current slide"
source_library: "Keynote"
source_file: "Transition-Apply-MagicMove-Medium.scpt"
siri_phrases:
  - "apply [a] magic move [transition]"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to applyMagicMoveTransitionEffectToCurrentSlide(2)
