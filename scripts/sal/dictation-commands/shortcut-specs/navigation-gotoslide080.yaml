name: "Go to the 80th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 80th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide080.scpt"
siri_phrases:
  - "go to slide 80"
  - "go to [the] 80th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(80)
