name: "Increase Size by 40%"
scope: "com.apple.iWork.Keynote"
description: "This Dictation Command will increase the size of the selected slide item by 40%."
source_library: "Keynote"
source_file: "Slide-Item-IncreaseSizeOfSelectedByPercentage-40.scpt"
siri_phrases:
  - "increase size by 40%"
  - "increase size by fourty percent"
  - "increase size by 40 percent"
  - "scale [this] up 40%"
  - "scale [this] up fourty percent"
  - "scale [this] up 40 percent"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to increaseSizeOfSelectedUnlockedSlideItemsByPercentage(40)
