name: "Change Theme to Artisan"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Artisan"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Artisan.scpt"
siri_phrases:
  - "change [the] theme to artisan"
  - "change [the] template to artisan"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Artisan")
