name: "Go to the 58th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 58th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide058.scpt"
siri_phrases:
  - "go to slide 58"
  - "go to [the] 58th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(58)
