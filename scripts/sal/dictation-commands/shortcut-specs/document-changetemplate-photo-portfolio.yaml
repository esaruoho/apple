name: "Change Theme to Photo Portfolio"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Photo Portfolio"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Photo-Portfolio.scpt"
siri_phrases:
  - "change [the] theme to photo portfolio"
  - "change [the] template to photo portfolio"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Photo_Portfolio")
