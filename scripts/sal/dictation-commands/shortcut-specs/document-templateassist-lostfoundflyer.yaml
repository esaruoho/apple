name: "Template Assist: Lost & Found Flyer"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Lost & Found Flyer template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-LostFoundFlyer.scpt"
siri_phrases:
  - "assist [me] with [the] lost and found flyer template"
  - "assist [me] with [the] template lost and found flyer"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_LOSTFOUND_FLYER")
