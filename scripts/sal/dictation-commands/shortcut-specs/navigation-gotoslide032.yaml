name: "Go to the 32nd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 32nd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide032.scpt"
siri_phrases:
  - "go to slide 32"
  - "go to [the] 32nd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(32)
