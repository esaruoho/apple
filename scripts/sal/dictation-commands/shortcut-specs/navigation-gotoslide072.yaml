name: "Go to the 72nd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 72nd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide072.scpt"
siri_phrases:
  - "go to slide 72"
  - "go to [the] 72nd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(72)
