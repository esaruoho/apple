name: "Unlock Default Body Item"
scope: "com.apple.iWork.Keynote"
description: "Unlock the default body item if it is showing"
source_library: "Keynote"
source_file: "Accessibility-UnlockDefaultBodyItemOfCurrentSlide.scpt"
siri_phrases:
  - "unlock [the] [default] body [item]"
applescript: |
  use script "DC-Assistive-Keynote"
  tell script "DC-Assistive-Keynote" to unlockDefaultBodyItemOnCurrentSlide()
