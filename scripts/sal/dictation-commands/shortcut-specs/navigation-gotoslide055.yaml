name: "Go to the 55th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 55th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide055.scpt"
siri_phrases:
  - "go to slide 55"
  - "go to [the] 55th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(55)
