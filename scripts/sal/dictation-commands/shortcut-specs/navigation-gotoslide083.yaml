name: "Go to the 83rd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 83rd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide083.scpt"
siri_phrases:
  - "go to slide 83"
  - "go to [the] 83rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(83)
