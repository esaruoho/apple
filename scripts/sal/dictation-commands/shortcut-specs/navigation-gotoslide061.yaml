name: "Go to the 61st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 61st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide061.scpt"
siri_phrases:
  - "go to slide 61"
  - "go to [the] 61st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(61)
