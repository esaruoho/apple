name: "Go to the 86th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 86th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide086.scpt"
siri_phrases:
  - "go to slide 86"
  - "go to [the] 86th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(86)
