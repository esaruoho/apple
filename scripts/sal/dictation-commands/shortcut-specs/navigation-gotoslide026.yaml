name: "Go to the 26th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 26th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide026.scpt"
siri_phrases:
  - "go to slide 26"
  - "go to [the] 26th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(26)
