name: "Turn off Dash Substitution"
scope: "com.apple.iWork.Keynote"
description: "Turn off automatic dash substitution in entered text"
source_library: "Keynote"
source_file: "Preferences-TurnDashSubstitutionOn.scpt"
siri_phrases:
  - "turn dash substitution off"
  - "turn off dash substitution"
applescript: |
  use script "DC-Assistive-Keynote"
  tell script "DC-Assistive-Keynote" to setDashSubstitutionPreference(false)
