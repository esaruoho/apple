name: "Go to the 47th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 47th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide047.scpt"
siri_phrases:
  - "go to slide 47"
  - "go to [the] 47th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(47)
