name: "Move Selected Finder Items with Replacement into Desktop folder"
scope: "com.apple.finder"
description: "Move the items selected in the Finder into the Desktop folder, replacing existing items with the same name. The moved items will highlighted after moving."
source_library: "Workspace"
source_file: "Selection-MoveWithReplacementToDesktopFolder.scpt"
siri_phrases:
  - "move this with replacement to [the] desktop [folder]"
  - "move this with replacement into [the] desktop [folder]"
  - "move these with replacement to [the] desktop [folder]"
  - "move these with replacement into [the] desktop [folder]"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to moveFinderSelectionIntoDesktopFolder(true,true)
