name: "Template Assist: Event Poster Small"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Event Poster Small template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-EventPosterSmall.scpt"
siri_phrases:
  - "assist [me] with [the] small event poster template"
  - "assist [me] with [the] template event poster small"
  - "assist [me] with [the] template small event poster"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_EVENT_POSTER_SMALL")
