name: "Template Assist: Kids Certificate"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Kids Certificate template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-KidsCertificate.scpt"
siri_phrases:
  - "assist [me] with [the] kids certificate template"
  - "assist [me] with [the] template kids certificate"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_KIDS_CERTIFICATE")
