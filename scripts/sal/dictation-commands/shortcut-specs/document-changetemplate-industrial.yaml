name: "Change Theme to Industrial"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Industrial"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Industrial.scpt"
siri_phrases:
  - "change [the] theme to industrial"
  - "change [the] template to industrial"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Industrial")
