name: "Go to the 76th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 76th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide076.scpt"
siri_phrases:
  - "go to slide 76"
  - "go to [the] 76th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(76)
