name: "Template Assist: Photo Poster Big"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Photo Poster Big template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-PhotoPosterBig.scpt"
siri_phrases:
  - "assist [me] with [the] big photo poster template"
  - "assist [me] with [the] large photo poster template"
  - "assist [me] with [the] template photo poster big"
  - "assist [me] with [the] template photo poster large"
  - "assist [me] with [the] template big photo poster"
  - "assist [me] with [the] template large photo poster"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_PHOTO_POSTER_BIG")
