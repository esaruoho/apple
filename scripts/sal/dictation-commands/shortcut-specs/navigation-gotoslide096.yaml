name: "Go to the 96th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 96th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide096.scpt"
siri_phrases:
  - "go to slide 96"
  - "go to [the] 96th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(96)
