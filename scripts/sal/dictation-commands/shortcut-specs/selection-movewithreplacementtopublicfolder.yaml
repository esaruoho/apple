name: "Move Selected Finder Items with Replacement into Public folder"
scope: "com.apple.finder"
description: "Move the items selected in the Finder into the Public folder, replacing existing items with the same name. The moved items will highlighted after moving."
source_library: "Workspace"
source_file: "Selection-MoveWithReplacementToPublicFolder.scpt"
siri_phrases:
  - "move this with replacement to [the] public [folder]"
  - "move this with replacement into [the] public [folder]"
  - "move these with replacement to [the] public [folder]"
  - "move these with replacement into [the] public [folder]"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to moveFinderSelectionIntoPublicFolder(true,true)
