name: "Go to the 65th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 65th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide065.scpt"
siri_phrases:
  - "go to slide 65"
  - "go to [the] 65th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(65)
