name: "Go to the 33rd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 33rd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide033.scpt"
siri_phrases:
  - "go to slide 33"
  - "go to [the] 33rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(33)
