name: "Set Master Slide to \u201cPhoto - Horizontal Alt\u201d"
scope: "com.apple.iWork.Keynote"
description: "Changes the master slide of the current slide to \u201cPhoto - Horizontal Alt\u201d (only in the Photo Essay theme)"
source_library: "Keynote"
source_file: "Slide-Master-PhotoHorizontalAlt.scpt"
siri_phrases:
  - "change [the] master slide to photo horizontal alternative"
  - "set [the] master slide to photo horizontal alternative"
  - "change [the] slide master to photo horizontal alternative"
  - "set [the] slide master to photo horizontal alternative"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to setMasterOfCurrentSlide("MASTER_PHOTO_HORIZONTAL_ALT")
