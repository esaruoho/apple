name: "Go to the 73th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 73th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide073.scpt"
siri_phrases:
  - "go to slide 73"
  - "go to [the] 73rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(73)
