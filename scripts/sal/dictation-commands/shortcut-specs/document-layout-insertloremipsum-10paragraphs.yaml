name: "Paste 10 Paragraphs of Dummy Text"
scope: "com.apple.iWork.Pages"
description: "This command will place ten paragraphs of lorem ipsum on the clipboard, and then paste into the document at the current insertion point."
source_library: "Pages"
source_file: "Document-Layout-InsertLoremIpsum-10Paragraphs.scpt"
siri_phrases:
  - "10 paragraphs of dummy text"
  - "10 paragraphs of lorem ipsum"
applescript: |
  use script "Lorem Ipsum"
  tell script "Lorem Ipsum" to pasteNParagraphsFromClipboard(10)
