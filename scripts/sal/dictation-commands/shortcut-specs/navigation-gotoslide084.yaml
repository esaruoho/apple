name: "Go to the 84th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 84th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide084.scpt"
siri_phrases:
  - "go to slide 84"
  - "go to [the] 84th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(84)
