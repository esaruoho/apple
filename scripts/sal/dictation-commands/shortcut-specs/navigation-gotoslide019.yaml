name: "Go to the 19th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 19th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide019.scpt"
siri_phrases:
  - "go to slide 19"
  - "go to [the] 19th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(19)
