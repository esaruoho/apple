name: "Go to the 36th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 36th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide036.scpt"
siri_phrases:
  - "go to slide 36"
  - "go to [the] 36th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(36)
