name: "Move Selected Finder Items into the Music folder"
scope: "com.apple.finder"
description: "Move the items selected in the Finder into the Music folder. \u201ccopy\u201d will be appended to the names of the moved items if items will the same name exist in the destination folder. The moved items will highlighted after moving."
source_library: "Workspace"
source_file: "Selection-MoveToMusicFolder.scpt"
siri_phrases:
  - "move this to [the] music [folder]"
  - "move this into [the] music [folder]"
  - "move these to [the] music [folder]"
  - "move these into [the] music [folder]"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to moveFinderSelectionIntoMusicFolder(false,true)
