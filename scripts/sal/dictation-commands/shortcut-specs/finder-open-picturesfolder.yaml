name: "Open Pictures Folder"
scope: "com.apple.speech.SystemWideScope"
description: "This command will switch to the Finder and open the current user\u2019s Pictures folder."
source_library: "Workspace"
source_file: "Finder-Open-PicturesFolder.scpt"
siri_phrases:
  - "open [the] pictures folder"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to getPathForUserPicturesDirectory(true)
