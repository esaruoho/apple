name: "Add to Favorites"
scope: "com.apple.Photos"
description: "Add the selected media items to the Favorites album"
source_library: "Photos"
source_file: "Photos-MediaItem-AddToFavorites.scpt"
siri_phrases:
  - "add [this] to favorites"
  - "add these to favorites"
applescript: |
  use script "DC-Photos"
  tell script "DC-Photos" to addSelectedMediaItemsToFavorites()
