name: "Start New Screen Recording"
scope: "com.apple.speech.SystemWideScope"
description: "Create and begin a new screen recording using the default settings."
source_library: "QuickTime Player"
source_file: "Record-StartNewAudioDocument.scpt"
siri_phrases:
  - "begin [a] [new] audio recording"
  - "start [a] [new] audio recording"
  - "record [a] [an] [new] audio [clip]"
applescript: |
  use script "DC-QuickTime Player"
  tell script "DC-QuickTime Player" to newAudioRecordingDocument(true)
