name: "Go to the 24th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 24th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide024.scpt"
siri_phrases:
  - "go to slide 24"
  - "go to [the] 24th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(24)
