name: "Go to the 79th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 79th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide079.scpt"
siri_phrases:
  - "go to slide 79"
  - "go to [the] 79th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(79)
