name: "Change Theme to Drafting"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Drafting"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Drafting.scpt"
siri_phrases:
  - "change [the] theme to drafting"
  - "change [the] template to drafting"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Drafting")
