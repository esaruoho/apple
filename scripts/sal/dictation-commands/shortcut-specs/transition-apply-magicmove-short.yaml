name: "Apply a Short Magic Move Transition"
scope: "com.apple.iWork.Keynote"
description: "Apply a Magic Move transition of 1-second to the current slide"
source_library: "Keynote"
source_file: "Transition-Apply-MagicMove-Short.scpt"
siri_phrases:
  - "apply [a] short magic move [transition]"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to applyMagicMoveTransitionEffectToCurrentSlide(1)
