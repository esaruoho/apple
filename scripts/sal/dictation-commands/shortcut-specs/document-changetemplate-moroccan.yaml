name: "Change Theme to Moroccan"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Moroccan"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Moroccan.scpt"
siri_phrases:
  - "change [the] theme to moroccan"
  - "change [the] template to moroccan"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Moroccan")
