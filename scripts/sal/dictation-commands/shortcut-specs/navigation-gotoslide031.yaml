name: "Go to the 31st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 31st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide031.scpt"
siri_phrases:
  - "go to slide 31"
  - "go to [the] 31st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(31)
