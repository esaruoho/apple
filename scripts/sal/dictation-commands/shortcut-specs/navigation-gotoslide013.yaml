name: "Go to the 13th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 13th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide013.scpt"
siri_phrases:
  - "go to slide 13"
  - "go to [the] 13th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(13)
