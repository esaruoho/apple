name: "Change Theme to Improv"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Improv"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Improv.scpt"
siri_phrases:
  - "change [the] theme to improv"
  - "change [the] template to improv"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Improv")
