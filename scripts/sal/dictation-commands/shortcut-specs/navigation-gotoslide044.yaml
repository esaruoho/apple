name: "Go to the 44th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 44th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide044.scpt"
siri_phrases:
  - "go to slide 44"
  - "go to [the] 44th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(44)
