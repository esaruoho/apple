name: "Go to the 29th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 29th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide029.scpt"
siri_phrases:
  - "go to slide 29"
  - "go to [the] 29th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(29)
