name: "Go to the 21st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 21st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide021.scpt"
siri_phrases:
  - "go to slide 21"
  - "go to [the] 21st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(21)
