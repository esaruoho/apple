name: "Go to the 91th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 91th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide091.scpt"
siri_phrases:
  - "go to slide 91"
  - "go to [the] 91st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(91)
