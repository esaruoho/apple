name: "Paste 2 Paragraphs of Dummy Text"
scope: "com.apple.iWork.Pages"
description: "This command will place two paragraphs of lorem ipsum on the clipboard, and then paste into the document at the current insertion point."
source_library: "Pages"
source_file: "Document-Layout-InsertLoremIpsum-2Paragraphs.scpt"
siri_phrases:
  - "two paragraphs of dummy text"
  - "two paragraphs of lorem ipsum"
applescript: |
  use script "Lorem Ipsum"
  tell script "Lorem Ipsum" to pasteNParagraphsFromClipboard(2)
