name: "Go to the 94th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 94th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide094.scpt"
siri_phrases:
  - "go to slide 94"
  - "go to [the] 94th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(94)
