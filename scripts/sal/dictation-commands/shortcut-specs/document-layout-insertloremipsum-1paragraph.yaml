name: "Paste 1 Paragraph of Dummy Text"
scope: "com.apple.iWork.Pages"
description: "This command will place one paragraph of lorem ipsum on the clipboard, and then paste into the document at the current insertion point."
source_library: "Pages"
source_file: "Document-Layout-InsertLoremIpsum-1Paragraph.scpt"
siri_phrases:
  - "one paragraph of dummy text"
  - "one paragraph of lorem ipsum"
applescript: |
  use script "Lorem Ipsum"
  tell script "Lorem Ipsum" to pasteNParagraphsFromClipboard(1)
