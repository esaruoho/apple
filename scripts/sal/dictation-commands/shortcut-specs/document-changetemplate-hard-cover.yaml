name: "Change Theme to Hard Cover"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Hard Cover"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Hard-Cover.scpt"
siri_phrases:
  - "change [the] theme to hard cover"
  - "change [the] template to hard cover"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Hard_Cover")
