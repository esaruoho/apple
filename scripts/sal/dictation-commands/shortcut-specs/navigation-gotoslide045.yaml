name: "Go to the 45th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 45th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide045.scpt"
siri_phrases:
  - "go to slide 45"
  - "go to [the] 45th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(45)
