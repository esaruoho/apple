name: "Go to the 18th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 18th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide018.scpt"
siri_phrases:
  - "go to slide 18"
  - "go to [the] 18th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(18)
