name: "Go to the 15th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 15th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide015.scpt"
siri_phrases:
  - "go to slide 15"
  - "go to [the] 15th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(15)
