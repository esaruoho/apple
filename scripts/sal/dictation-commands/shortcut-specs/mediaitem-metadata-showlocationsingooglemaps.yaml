name: "Show Location in Google Maps"
scope: "com.apple.Photos"
description: "Display within a floating window, the location of the selected media item in Google Maps."
source_library: "Photos"
source_file: "MediaItem-Metadata-ShowLocationsInGoogleMaps.scpt"
siri_phrases:
  - "show this in google maps"
  - "show location [of this] in google maps"
applescript: |
  use script "DC-Photos"
  tell script "DC-Photos" to showSelectedItemInGoogleMaps()
