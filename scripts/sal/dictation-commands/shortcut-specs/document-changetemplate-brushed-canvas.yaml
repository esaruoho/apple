name: "Change Theme to Brushed Canvas"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Brushed Canvas"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Brushed-Canvas.scpt"
siri_phrases:
  - "change [the] theme to brushed canvas"
  - "change [the] template to brushed canvas"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Brushed_Canvas")
