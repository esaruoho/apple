name: "Go to the 41st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 41st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide041.scpt"
siri_phrases:
  - "go to slide 41"
  - "go to [the] 41st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(41)
