name: "Go to the 49th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 49th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide049.scpt"
siri_phrases:
  - "go to slide 49"
  - "go to [the] 49th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(49)
