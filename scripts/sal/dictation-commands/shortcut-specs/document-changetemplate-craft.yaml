name: "Change Theme to Craft"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Craft"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Craft.scpt"
siri_phrases:
  - "change [the] theme to craft"
  - "change [the] template to craft"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Craft")
