name: "Change Theme to Kyoto"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Kyoto"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Kyoto.scpt"
siri_phrases:
  - "change [the] theme to kyoto"
  - "change [the] template to kyoto"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Kyoto")
