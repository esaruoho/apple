name: "Go to the last Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the last slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToLastSlide.scpt"
siri_phrases:
  - "go to [the] last slide"
  - "go to the end"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(-1)
