name: "New Presentation: Chalkboard-Wide"
scope: "com.apple.iWork.Keynote"
description: "Create a new wide presentation using the Chalkboard theme"
source_library: "Keynote"
source_file: "Document-New-Chalkboard-Wide.scpt"
siri_phrases:
  - "make [a] [new] wide presentation using [the] chalkboard template"
  - "make [a] [new] wide presentation with [the] chalkboard template"
  - "make [a] [new] wide presentation using [the] chalkboard theme"
  - "make [a] [new] wide presentation with [the] chalkboard theme"
  - "make [a] [new] presentation using [the] wide chalkboard template"
  - "make [a] [new] presentation with [the] wide chalkboard template"
  - "make [a] [new] presentation using [the] wide chalkboard theme"
  - "make [a] [new] presentation with [the] wide chalkboard theme"
applescript: |
  use script "DC-Keynote"
