name: "Template Assist: School Poster Big"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the School Poster Big template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-SchoolPosterBig.scpt"
siri_phrases:
  - "assist [me] with [the] big school poster template"
  - "assist [me] with [the] large school poster template"
  - "assist [me] with [the] template school poster big"
  - "assist [me] with [the] template school poster large"
  - "assist [me] with [the] template big school poster"
  - "assist [me] with [the] template large school poster"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_SCHOOL_POSTER_BIG")
