name: "Decrease Size by 40%"
scope: "com.apple.iWork.Keynote"
description: "This Dictation Command will decrease the size of the selected slide item by 40%."
source_library: "Keynote"
source_file: "Slide-Item-DecreaseSizeOfSelectedByPercentage-40.scpt"
siri_phrases:
  - "decrease size [by] 40%"
  - "decrease size [by] fourty percent"
  - "decrease size [by] 40 percent"
  - "reduce size [by] 40%"
  - "reduce size [by] fourty percent"
  - "reduce size [by] 40 percent"
  - "scale [this] down 40%"
  - "scale [this] down fourty percent"
  - "scale [this] down 40 percent"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to reduceSizeOfSelectedUnlockedSlideItemsByPercentage(40)
