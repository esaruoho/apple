name: "Go to the 68th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 68th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide068.scpt"
siri_phrases:
  - "go to slide 68"
  - "go to [the] 68th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(68)
