name: "Open User Applications Folder"
scope: "com.apple.speech.SystemWideScope"
description: "This command will switch to the Finder and open the current user\u2019s Applications folder."
source_library: "Workspace"
source_file: "Finder-Open-UserApplicationsFolder.scpt"
siri_phrases:
  - "open my applications folder"
  - "open user applications folder"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to getPathForUserApplicationsDirectory(true)
