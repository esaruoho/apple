name: "Go to the 98th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 98th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide098.scpt"
siri_phrases:
  - "go to slide 98"
  - "go to [the] 98th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(98)
