name: "Go to the 57th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 57th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide057.scpt"
siri_phrases:
  - "go to slide 57"
  - "go to [the] 57th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(57)
