name: "Change Theme to Editorial"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Editorial"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Editorial.scpt"
siri_phrases:
  - "change [the] theme to editorial"
  - "change [the] template to editorial"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Editorial")
