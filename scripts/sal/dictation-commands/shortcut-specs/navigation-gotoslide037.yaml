name: "Go to the 37th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 37th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide037.scpt"
siri_phrases:
  - "go to slide 37"
  - "go to [the] 37th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(37)
