  - "make [a] [new] standard presentation with [the] photo portfolio template"
  - "make [a] [new] standard presentation using [the] photo portfolio theme"
  - "make [a] [new] standard presentation with [the] photo portfolio theme"
  - "make [a] [new] presentation using [the] standard photo portfolio template"
  - "make [a] [new] presentation with [the] standard photo portfolio template"
  - "make [a] [new] presentation using [the] standard photo portfolio theme"
  - "make [a] [new] presentation with [the] standard photo portfolio theme"
applescript: |
