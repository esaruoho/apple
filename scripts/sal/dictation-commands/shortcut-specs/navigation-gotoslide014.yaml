name: "Go to the 14th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 14th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide014.scpt"
siri_phrases:
  - "go to slide 14"
  - "go to [the] 14th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(14)
