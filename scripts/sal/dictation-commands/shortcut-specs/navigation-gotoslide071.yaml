name: "Go to the 71st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 71st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide071.scpt"
siri_phrases:
  - "go to slide 71"
  - "go to [the] 71st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(71)
