name: "Go to the 50th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 50th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide050.scpt"
siri_phrases:
  - "go to slide 50"
  - "go to [the] 50th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(50)
