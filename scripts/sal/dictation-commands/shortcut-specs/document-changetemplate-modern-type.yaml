name: "Change Theme to Modern Type"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Modern Type"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Modern-Type.scpt"
siri_phrases:
  - "change [the] theme to modern type"
  - "change [the] template to modern type"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Modern_Type")
