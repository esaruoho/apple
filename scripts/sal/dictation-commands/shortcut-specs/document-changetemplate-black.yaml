name: "Change Theme to Black"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Black"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Black.scpt"
siri_phrases:
  - "change [the] theme to black"
  - "change [the] template to black"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Black")
