name: "Go to the 22nd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 22nd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide022.scpt"
siri_phrases:
  - "go to slide 22"
  - "go to [the] 22nd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(22)
