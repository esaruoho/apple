name: "Change Theme to Gradient"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Gradient"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Gradient.scpt"
siri_phrases:
  - "change [the] theme to gradient"
  - "change [the] template to gradient"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Gradient")
