name: "Choose File for Sixth Image of Current Slide"
scope: "com.apple.iWork.Keynote"
description: "Using the standard system chooser dialog, select and import an image file for the sixth image of the current slide"
source_library: "Keynote"
source_file: "Image-ChooseFileForImage6OfCurrentSlide.scpt"
siri_phrases:
  - "choose [[a] file for] image 6"
  - "choose [[a] file for] photo 6"
  - "choose [[a] file for] [the] sixth image"
  - "choose [[a] file for] [the] sixth photo"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to assistImportForImageByIndex(6, true)
