name: "Change Theme to Chalkboard"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Chalkboard"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Chalkboard.scpt"
siri_phrases:
  - "change [the] theme to chalkboard"
  - "change [the] template to chalkboard"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Chalkboard")
