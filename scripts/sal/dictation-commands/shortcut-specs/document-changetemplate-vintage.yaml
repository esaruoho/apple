name: "Change Theme to Vintage"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Vintage"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Vintage.scpt"
siri_phrases:
  - "change [the] theme to vintage"
  - "change [the] template to vintage"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Vintage")
