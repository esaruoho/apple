name: "Go to the 38th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 38th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide038.scpt"
siri_phrases:
  - "go to slide 38"
  - "go to [the] 38th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(38)
