name: "New Presentation: Chalkboard-Standard"
scope: "com.apple.iWork.Keynote"
description: "Create a new standard presentation using the Chalkboard theme"
source_library: "Keynote"
source_file: "Document-New-Chalkboard-Standard.scpt"
siri_phrases:
  - "make [a] [new] standard presentation using [the] chalkboard template"
  - "make [a] [new] standard presentation with [the] chalkboard template"
  - "make [a] [new] standard presentation using [the] chalkboard theme"
  - "make [a] [new] standard presentation with [the] chalkboard theme"
  - "make [a] [new] presentation using [the] standard chalkboard template"
  - "make [a] [new] presentation with [the] standard chalkboard template"
  - "make [a] [new] presentation using [the] standard chalkboard theme"
  - "make [a] [new] presentation with [the] standard chalkboard theme"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to newDocumentUsingSpecifiedParameters("standard", "Chalkboard")
