name: "Go to the 70th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 70th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide070.scpt"
siri_phrases:
  - "go to slide 70"
  - "go to [the] 70th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(70)
