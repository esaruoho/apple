name: "Go to the 93th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 93th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide093.scpt"
siri_phrases:
  - "go to slide 93"
  - "go to [the] 93rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(93)
