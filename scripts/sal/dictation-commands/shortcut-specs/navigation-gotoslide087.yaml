name: "Go to the 87th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 87th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide087.scpt"
siri_phrases:
  - "go to slide 87"
  - "go to [the] 87th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(87)
