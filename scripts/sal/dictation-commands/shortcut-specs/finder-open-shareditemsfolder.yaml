name: "Open Shared Items Folder"
scope: "com.apple.speech.SystemWideScope"
description: "This command will switch to the Finder and open the Shared Items folder."
source_library: "Workspace"
source_file: "Finder-Open-SharedItemsFolder.scpt"
siri_phrases:
  - "open [the] shared [items] folder"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to getPathForSharedItemsDirectory(true)
