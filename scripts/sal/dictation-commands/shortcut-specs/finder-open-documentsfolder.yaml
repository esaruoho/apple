name: "Open Documents Folder"
scope: "com.apple.speech.SystemWideScope"
description: "This command will switch to the Finder and open the current user\u2019s Documents folder."
source_library: "Workspace"
source_file: "Finder-Open-DocumentsFolder.scpt"
siri_phrases:
  - "open [the] documents folder"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to getPathForUserDocumentsDirectory(true)
