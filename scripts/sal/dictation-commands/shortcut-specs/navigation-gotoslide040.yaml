name: "Go to the 40th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 40th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide040.scpt"
siri_phrases:
  - "go to slide 40"
  - "go to [the] 40th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(40)
