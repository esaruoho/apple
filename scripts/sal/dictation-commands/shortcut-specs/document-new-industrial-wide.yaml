name: "New Presentation: Industrial-Wide"
scope: "com.apple.iWork.Keynote"
description: "Create a new wide presentation using the Industrial theme"
source_library: "Keynote"
source_file: "Document-New-Industrial-Wide.scpt"
siri_phrases:
