  - "make [a] [new] wide presentation with [the] industrial template"
  - "make [a] [new] wide presentation using [the] industrial theme"
  - "make [a] [new] wide presentation with [the] industrial theme"
  - "make [a] [new] presentation using [the] wide industrial template"
  - "make [a] [new] presentation with [the] wide industrial template"
  - "make [a] [new] presentation using [the] wide industrial theme"
  - "make [a] [new] presentation with [the] wide industrial theme"
