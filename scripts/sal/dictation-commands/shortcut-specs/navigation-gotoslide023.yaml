name: "Go to the 23rd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 23rd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide023.scpt"
siri_phrases:
  - "go to slide 23"
  - "go to [the] 23rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(23)
