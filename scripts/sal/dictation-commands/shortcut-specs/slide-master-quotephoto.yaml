name: "Set Master Slide to \u201cQuote Photo\u201d"
scope: "com.apple.iWork.Keynote"
description: "Changes the master slide of the current slide to \u201cQuote Photo\u201d (only in Photo Essay theme)"
source_library: "Keynote"
source_file: "Slide-Master-QuotePhoto.scpt"
siri_phrases:
  - "change [the] master slide to quote photo"
  - "set [the] master slide to quote photo"
  - "change [the] slide master to quote photo"
  - "set [the] slide master to quote photo"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to setMasterOfCurrentSlide("MASTER_QUOTE_PHOTO")
