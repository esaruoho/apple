name: "Go to the 69th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 69th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide069.scpt"
siri_phrases:
  - "go to slide 69"
  - "go to [the] 69th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(69)
