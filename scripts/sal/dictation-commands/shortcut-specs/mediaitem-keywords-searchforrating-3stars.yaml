name: "Search for Rating Keyword \u2605\u2605\u2605"
scope: "com.apple.Photos"
description: "This Dictation Command will search for media items with a rating keyword of \"\u2605\u2605\u2605\""
source_library: "Photos"
source_file: "MediaItem-Keywords-SearchForRating-3Stars.scpt"
siri_phrases:
  - "search for 3 stars"
  - "search for 3 star [images]"
  - "search for 3 star photos"
applescript: |
  use script "DC-Photos"
  tell script "DC-Photos" to searchForItemsWithRating(3)
