name: "Set Master Slide to \u201cQuote\u201d"
scope: "com.apple.iWork.Keynote"
description: "Changes the master slide of the current slide to \u201cQuote\u201d"
source_library: "Keynote"
source_file: "Slide-Master-Quote.scpt"
siri_phrases:
  - "change [the] master slide to quote"
  - "set [the] master slide to quote"
  - "change [the] slide master to quote"
  - "set [the] slide master to quote"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to setMasterOfCurrentSlide("MASTER_QUOTE")
