name: "Template Assist: Type Poster Small"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Type Poster Small template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-TypePosterSmall.scpt"
siri_phrases:
  - "assist [me] with [the] small type poster template"
  - "assist [me] with [the] template type poster small"
  - "assist [me] with [the] template small type poster"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_TYPE_POSTER_SMALL")
