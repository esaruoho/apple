name: "Change Theme to Parchment"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Parchment"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Parchment.scpt"
siri_phrases:
  - "change [the] theme to parchment"
  - "change [the] template to parchment"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Parchment")
