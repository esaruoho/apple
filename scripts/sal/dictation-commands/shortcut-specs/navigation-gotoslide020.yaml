name: "Go to the 20th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 20th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide020.scpt"
siri_phrases:
  - "go to slide 20"
  - "go to [the] 20th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(20)
