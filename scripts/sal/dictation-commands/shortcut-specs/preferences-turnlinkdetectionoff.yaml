name: "Turn off Link Detection"
scope: "com.apple.iWork.Keynote"
description: "Turn off automatic link detection in entered text"
source_library: "Keynote"
source_file: "Preferences-TurnLinkDetectionOff.scpt"
siri_phrases:
  - "turn link detection off"
  - "turn off link detection"
applescript: |
  use script "DC-Assistive-Keynote"
  tell script "DC-Assistive-Keynote" to setLinkDetectionPreference(false)
