name: "Go to the 5th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 5th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide005.scpt"
siri_phrases:
  - "go to slide five"
  - "go to [the] fifth slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(5)
