name: "Go to the 99th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 99th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide099.scpt"
siri_phrases:
  - "go to slide 99"
  - "go to [the] 99th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(99)
