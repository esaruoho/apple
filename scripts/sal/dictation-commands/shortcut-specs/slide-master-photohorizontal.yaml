name: "Set Master Slide to \u201cPhoto - Horizontal\u201d"
scope: "com.apple.iWork.Keynote"
description: "Changes the master slide of the current slide to \u201cPhoto - Horizontal\u201d"
source_library: "Keynote"
source_file: "Slide-Master-PhotoHorizontal.scpt"
siri_phrases:
  - "change [the] master slide to photo horizontal"
  - "set [the] master slide to photo horizontal"
  - "change [the] slide master to photo horizontal"
  - "set [the] slide master to photo horizontal"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to setMasterOfCurrentSlide("MASTER_PHOTO_HORIZONTAL")
