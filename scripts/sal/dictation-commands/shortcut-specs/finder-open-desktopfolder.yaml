name: "Open Desktop Folder"
scope: "com.apple.speech.SystemWideScope"
description: "This command will switch to the Finder and open the current user\u2019s Desktop folder."
source_library: "Workspace"
source_file: "Finder-Open-DesktopFolder.scpt"
siri_phrases:
  - "open [the] desktop folder"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to getPathForUserDesktopDirectory(true)
