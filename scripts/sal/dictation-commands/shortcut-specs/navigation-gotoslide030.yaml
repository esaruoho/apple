name: "Go to the 30th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 30th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide030.scpt"
siri_phrases:
  - "go to slide 30"
  - "go to [the] 30th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(30)
