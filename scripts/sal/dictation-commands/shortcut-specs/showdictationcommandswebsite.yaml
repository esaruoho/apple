name: "Show Dictation Commands Website"
scope: "com.apple.speech.SystemWideScope"
description: "Open the website for Dictation Commands"
source_library: "Speech"
source_file: "ShowDictationCommandsWebsite.scpt"
siri_phrases:
  - "show your website"
  - "open your website"
  - "go to your website"
  - "show [the] dictation commands website"
  - "open [the] dictation commands website"
  - "go to [the] dictation commands website"
  - "show website for [the] dictation commands"
  - "open website for [the] dictation commands"
  - "go to website for [the] dictation commands"
applescript: |
  use script "DC-Help"
  tell script "DC-Help" to openDictationCommandsWebsite()
