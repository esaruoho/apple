name: "Go to the 67th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 67th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide067.scpt"
siri_phrases:
  - "go to slide 67"
  - "go to [the] 67th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(67)
