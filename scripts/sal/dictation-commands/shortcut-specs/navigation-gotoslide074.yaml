name: "Go to the 74th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 74th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide074.scpt"
siri_phrases:
  - "go to slide 74"
  - "go to [the] 74th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(74)
