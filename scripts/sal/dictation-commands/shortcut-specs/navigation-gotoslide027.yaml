name: "Go to the 27th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 27th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide027.scpt"
siri_phrases:
  - "go to slide 27"
  - "go to [the] 27th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(27)
