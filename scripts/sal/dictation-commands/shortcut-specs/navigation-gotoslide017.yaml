name: "Go to the 17th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 17th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide017.scpt"
siri_phrases:
  - "go to slide 17"
  - "go to [the] 17th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(17)
