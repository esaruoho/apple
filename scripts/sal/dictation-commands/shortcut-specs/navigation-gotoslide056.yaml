name: "Go to the 56th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 56th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide056.scpt"
siri_phrases:
  - "go to slide 56"
  - "go to [the] 56th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(56)
