name: "Go to the 81st Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 81st slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide081.scpt"
siri_phrases:
  - "go to slide 81"
  - "go to [the] 81st slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(81)
