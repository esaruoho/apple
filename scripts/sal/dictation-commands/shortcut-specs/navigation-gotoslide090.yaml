name: "Go to the 90th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 90th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide090.scpt"
siri_phrases:
  - "go to slide 90"
  - "go to [the] 90th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(90)
