name: "Go to the 10th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 10th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide010.scpt"
siri_phrases:
  - "go to slide 10"
  - "go to [the] 10th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(10)
