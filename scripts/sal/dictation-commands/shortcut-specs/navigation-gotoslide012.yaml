name: "Go to the 12th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 12th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide012.scpt"
siri_phrases:
  - "go to slide 12"
  - "go to [the] 12th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(12)
