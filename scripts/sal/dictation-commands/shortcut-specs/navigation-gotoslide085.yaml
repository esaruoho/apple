name: "Go to the 85th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 85th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide085.scpt"
siri_phrases:
  - "go to slide 85"
  - "go to [the] 85th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(85)
