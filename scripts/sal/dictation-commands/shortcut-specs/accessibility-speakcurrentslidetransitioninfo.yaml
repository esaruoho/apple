name: "Info about the Current Slide\u2019s Transition"
scope: "com.apple.iWork.Keynote"
description: "Speak information about the transition of the current slide"
source_library: "Keynote"
source_file: "Accessibility-SpeakCurrentSlideTransitionInfo.scpt"
siri_phrases:
  - "tell me about [the] transition for this slide"
  - "tell me about [the] transition of this slide"
  - "tell me about this slide's transition"
applescript: |
  use script "DC-Assistive-Keynote"
  tell script "DC-Assistive-Keynote" to speakInfoAboutTransitionOfCurrentSlide()
