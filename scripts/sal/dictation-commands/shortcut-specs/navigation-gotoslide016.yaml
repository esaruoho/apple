name: "Go to the 16th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 16th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide016.scpt"
siri_phrases:
  - "go to slide 16"
  - "go to [the] 16th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(16)
