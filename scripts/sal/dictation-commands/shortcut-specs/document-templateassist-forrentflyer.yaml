name: "Template Assist: For Rent Flyer"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the For Rent Flyer template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-ForRentFlyer.scpt"
siri_phrases:
  - "assist [me] with [the] for rent flyer template"
  - "assist [me] with [the] template for rent flyer"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_RENT_FLYER")
