name: "Move Selected Finder Items with Replacement into Documents folder"
scope: "com.apple.finder"
description: "Move the items selected in the Finder into the Documents folder, replacing existing items with the same name. The moved items will highlighted after moving."
source_library: "Workspace"
source_file: "Selection-MoveWithReplacementToDocumentsFolder.scpt"
siri_phrases:
  - "move this with replacement to [the] documents [folder]"
  - "move this with replacement into [the] documents [folder]"
  - "move these with replacement to [the] documents [folder]"
  - "move these with replacement into [the] documents [folder]"
applescript: |
  use script "DC-Workspace"
  tell script "DC-Workspace" to moveFinderSelectionIntoDocumentsFolder(true,true)
