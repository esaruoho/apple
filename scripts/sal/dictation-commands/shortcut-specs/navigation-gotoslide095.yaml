name: "Go to the 95th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 95th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide095.scpt"
siri_phrases:
  - "go to slide 95"
  - "go to [the] 95th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(95)
