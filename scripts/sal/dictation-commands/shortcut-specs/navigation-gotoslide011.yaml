name: "Go to the 11th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 11th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide011.scpt"
siri_phrases:
  - "go to slide 11"
  - "go to [the] 11th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(11)
