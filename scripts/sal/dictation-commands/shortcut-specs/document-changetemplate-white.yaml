name: "Change Theme to White"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to White"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-White.scpt"
siri_phrases:
  - "change [the] theme to white"
  - "change [the] template to white"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_White")
