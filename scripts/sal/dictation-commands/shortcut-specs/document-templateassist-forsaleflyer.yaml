name: "Template Assist: For Sale Flyer"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the For Sale Flyer template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-ForSaleFlyer.scpt"
siri_phrases:
  - "assist [me] with [the] for sale flyer template"
  - "assist [me] with [the] template for sale flyer"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_SALE_FLYER")
