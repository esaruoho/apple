name: "Go to the 82nd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 82nd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide082.scpt"
siri_phrases:
  - "go to slide 82"
  - "go to [the] 82nd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(82)
