name: "Go to the 60th Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 60th slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide060.scpt"
siri_phrases:
  - "go to slide 60"
  - "go to [the] 60th slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(60)
