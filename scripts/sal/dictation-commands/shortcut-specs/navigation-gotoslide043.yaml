name: "Go to the 43rd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 43rd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide043.scpt"
siri_phrases:
  - "go to slide 43"
  - "go to [the] 43rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(43)
