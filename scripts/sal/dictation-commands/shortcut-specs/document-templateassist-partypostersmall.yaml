name: "Template Assist: Party Poster Small"
scope: "com.apple.iWork.Pages"
description: "This command will open a new copy of the Party Poster Small template and interactively prompt you to enter text and choose image files to replace the placeholders in the new document."
source_library: "Pages"
source_file: "Document-TemplateAssist-PartyPosterSmall.scpt"
siri_phrases:
  - "assist [me] with [the] small party poster template"
  - "assist [me] with [the] template party poster small"
  - "assist [me] with [the] template small party poster"
applescript: |
  use script "DC-Pages"
  tell script "DC-Pages" to assistWithLocalizedTemplate("TEMPLATE_PARTY_POSTER_SMALL")
