  - "make [a] [new] standard presentation with [the] blueprint template"
  - "make [a] [new] standard presentation using [the] blueprint theme"
  - "make [a] [new] standard presentation with [the] blueprint theme"
  - "make [a] [new] presentation using [the] standard blueprint template"
  - "make [a] [new] presentation with [the] standard blueprint template"
  - "make [a] [new] presentation using [the] standard blueprint theme"
  - "make [a] [new] presentation with [the] standard blueprint theme"
