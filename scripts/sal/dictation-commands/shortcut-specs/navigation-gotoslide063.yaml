name: "Go to the 63rd Slide"
scope: "com.apple.iWork.Keynote"
description: "Make the 63rd slide the current slide"
source_library: "Keynote"
source_file: "Navigation-GoToSlide063.scpt"
siri_phrases:
  - "go to slide 63"
  - "go to [the] 63rd slide"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to goToSlideByNumber(63)
