name: "Set Master Slide to \u201cTitle - Center\u201d"
scope: "com.apple.iWork.Keynote"
description: "Changes the master slide of the current slide to \u201cTitle - Center\u201d"
source_library: "Keynote"
source_file: "Slide-Master-TitleCenter.scpt"
siri_phrases:
  - "change [the] master slide to title center"
  - "set [the] master slide to title center"
  - "change [the] slide master to title center"
  - "set [the] slide master to title center"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to setMasterOfCurrentSlide("MASTER_TITLE_CENTER")
