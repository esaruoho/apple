name: "Change Theme to Leather Book"
scope: "com.apple.iWork.Keynote"
description: "Change the theme of the frontmost document to Leather Book"
source_library: "Keynote"
source_file: "Document-ChangeTemplate-Leather-Book.scpt"
siri_phrases:
  - "change [the] theme to leather book"
  - "change [the] template to leather book"
applescript: |
  use script "DC-Keynote"
  tell script "DC-Keynote" to changeTemplateTo("THEME_Leather_Book")
