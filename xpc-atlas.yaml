Automation tiers:
  Tier 1-4: AppleScript sdef, App Intents, URL schemes (covered by app-probe.py)
  Tier 5:   XPC user-session agents (this probe — accessible without root)
  Tier 6:   XPC system daemons (this probe — requires entitlements or root)

Next steps:
  - User-session services can be probed with xpcspy (Frida wrapper)
  - System services require entitlement-bearing test binaries
  - Use: dsdump + ipsw for static protocol extraction
  - Use: launchctl print gui/$(id -u) <service> for per-service detail
