# Pages Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Pages" to <command>

app: "Pages"
slug: "pages"
commands_count: 11
classes_count: 23
suites_count: 3

data_types:
  accepts:
    - "NMSD"
    - "any"
    - "boolean"
    - "column"
    - "document"
    - "export format"
    - "export options"
    - "file"
    - "location specifier"
    - "range"
    - "record"
    - "specifier"
    - "table"
    - "text"
    - "type"
  produces:
    - "specifier"

suites:
  - name: "iWork Text Suite"
    description: "Classes and commands for iWorks text objects."
    classes:
      - name: "rich text"
        description: "This provides the base rich text class for all iWork applications."
        properties:
          - name: "color"
            type: "color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "real"
            access: "rw"
        elements:
          - "character"
          - "paragraph"
          - "word"
      - name: "character"
        description: "One of some text's characters."
        inherits: "rich text"
      - name: "paragraph"
        description: "One of some text's paragraphs."
        inherits: "rich text"
        elements:
          - "character"
          - "word"
      - name: "word"
        description: "One of some text's words."
        inherits: "rich text"
        elements:
          - "character"
  - name: "iWork Suite"
    description: "A set of basic classes for iWork applications."
    commands:
      - name: "set"
        description: "Sets the value of the specified object(s)."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "any"
            optional: false
      - name: "delete"
        description: "Delete an object."
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "make"
        description: "Create a new object."
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
