            optional: true
          - name: "with data"
            type: "any"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
      - name: "clear"
        description: "Clear the contents of a specified range of cells, including formatting and style."
        direct_parameter:
          type: "range"
          optional: false
      - name: "merge"
        description: "Merge a specified range of cells."
        direct_parameter:
          type: "range"
          optional: false
      - name: "sort"
        description: "Sort the rows of the table."
        direct_parameter:
          type: "table"
          optional: false
        parameters:
          - name: "by"
            type: "column"
            optional: false
          - name: "direction"
            type: "NMSD"
            optional: true
          - name: "in rows"
            type: "range"
            optional: true
      - name: "unmerge"
