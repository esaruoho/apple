# Finder Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Finder" to <command>

app: "Finder"
slug: "finder"
commands_count: 25
classes_count: 32
suites_count: 9

data_types:
  accepts:
    - "boolean"
    - "list"
    - "location specifier"
    - "property"
    - "record"
    - "specifier"
    - "text"
    - "type"
  produces:
    - "boolean"
    - "integer"
    - "specifier"

suites:
  - name: "Standard Suite"
    description: "Common terms that most applications should support"
    commands:
      - name: "open"
        description: "Open the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "using"
            type: "specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
      - name: "print"
        description: "Print the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "with properties"
            type: "record"
            optional: true
      - name: "quit"
        description: "Quit the Finder"
      - name: "activate"
        description: "Activate the specified window (or the Finder)"
        direct_parameter:
          type: "specifier"
          optional: true
      - name: "close"
        description: "Close an object"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "count"
        description: "Return the number of elements of a particular class within an object"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "each"
            type: "type"
            optional: false
        result:
          type: "integer"
      - name: "data size"
        description: "Return the size in bytes of an object"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "as"
            type: "type"
            optional: true
        result:
          type: "integer"
      - name: "delete"
        description: "Move an item from its container to the trash"
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "specifier"
      - name: "duplicate"
        description: "Duplicate one or more object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
          - name: "replacing"
            type: "boolean"
            optional: true
          - name: "routing suppressed"
            type: "boolean"
            optional: true
          - name: "exact copy"
            type: "boolean"
            optional: true
        result:
          type: "specifier"
      - name: "exists"
        description: "Verify if an object exists"
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "boolean"
      - name: "make"
        description: "Make a new element"
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
            type: "location specifier"
            optional: false
          - name: "to"
            type: "specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
      - name: "move"
        description: "Move object(s) to a new location"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: false
          - name: "replacing"
            type: "boolean"
            optional: true
          - name: "positioned at"
            type: "list"
            optional: true
          - name: "routing suppressed"
            type: "boolean"
            optional: true
        result:
          type: "specifier"
      - name: "select"
        description: "Select the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
