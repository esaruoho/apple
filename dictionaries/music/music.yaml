# Music Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Music" to <command>

app: "Music"
slug: "music"
commands_count: 31
classes_count: 26
suites_count: 3

data_types:
  accepts:
    - "boolean"
    - "eExF"
    - "eKnd"
    - "eSrA"
    - "file"
    - "file track"
    - "item"
    - "location specifier"
    - "playlist"
    - "print settings"
    - "record"
    - "specifier"
    - "text"
    - "type"
  produces:
    - "boolean"
    - "integer"
    - "specifier"
    - "text"
    - "track"

suites:
  - name: "Standard Suite"
    description: "Common terms for most applications"
    commands:
      - name: "print"
        description: "Print the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: true
        parameters:
          - name: "print dialog"
            type: "boolean"
            optional: true
          - name: "with properties"
            type: "print settings"
            optional: true
          - name: "kind"
            type: "eKnd"
            optional: true
          - name: "theme"
            type: "text"
            optional: true
      - name: "close"
        description: "Close an object"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "count"
        description: "Return the number of elements of a particular class within an object"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "each"
            type: "type"
            optional: false
        result:
          type: "integer"
      - name: "delete"
        description: "Delete an element from an object"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "duplicate"
        description: "Duplicate one or more object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
        result:
          type: "specifier"
      - name: "exists"
        description: "Verify if an object exists"
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "boolean"
      - name: "make"
        description: "Make a new element"
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
            type: "location specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
      - name: "move"
        description: "Move playlist(s) to a new location"
        direct_parameter:
          type: "playlist"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: false
      - name: "open"
        description: "Open the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "run"
        description: "Run the application"
      - name: "quit"
        description: "Quit the application"
      - name: "save"
        description: "Save the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
  - name: "Music Suite"
    description: "The event suite specific to Music"
    commands:
      - name: "add"
        description: "add one or more files to a playlist"
