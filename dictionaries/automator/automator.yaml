# Automator Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Automator" to <command>

app: "Automator"
slug: "automator"
commands_count: 16
classes_count: 17
suites_count: 5

data_types:
  accepts:
    - "alias"
    - "any"
    - "boolean"
    - "integer"
    - "location specifier"
    - "print settings"
    - "record"
    - "savo"
    - "specifier"
    - "text"
    - "type"
    - "workflow"
  produces:
    - "any"
    - "boolean"
    - "document"
    - "integer"
    - "specifier"

suites:
  - name: "Standard Suite"
    description: "Common classes and commands for most applications."
    commands:
      - name: "close"
        description: "Close an object."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "saving"
            type: "savo"
            optional: true
          - name: "saving in"
            type: "alias"
            optional: true
      - name: "count"
        description: "Return the number of elements of a particular class within an object."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "each"
            type: "type"
            optional: true
        result:
          type: "integer"
      - name: "delete"
        description: "Delete an object."
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "duplicate"
        description: "Copy object(s) and put the copies at a new location."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
      - name: "exists"
        description: "Verify if an object exists."
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "boolean"
      - name: "get"
        description: "Get the data for an object."
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "any"
      - name: "make"
        description: "Make a new object."
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
            type: "location specifier"
            optional: true
          - name: "with data"
            type: "any"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
      - name: "move"
        description: "Move object(s) to a new location."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: false
      - name: "open"
        description: "Open an object."
        direct_parameter:
          type: "alias"
          optional: false
        result:
          type: "document"
      - name: "print"
        description: "Print an object."
        direct_parameter:
          type: "alias"
          optional: false
        parameters:
          - name: "print dialog"
            type: "boolean"
            optional: true
          - name: "with properties"
            type: "print settings"
            optional: true
      - name: "quit"
        description: "Quit an application."
        parameters:
          - name: "saving"
            type: "savo"
            optional: true
      - name: "save"
        description: "Save an object."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "as"
            type: "text"
            optional: true
          - name: "in"
            type: "alias"
            optional: true
      - name: "set"
        description: "Set an object's data."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "any"
            optional: false
    classes:
      - name: "application"
        description: "An application's top level scripting object."
        inherits: "item"
        properties:
          - name: "frontmost"
            type: "boolean"
            access: "r"
          - name: "name"
            type: "text"
            access: "r"
          - name: "version"
            type: "text"
            access: "r"
        elements:
