# Contacts Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Contacts" to <command>

app: "Contacts"
slug: "contacts"
commands_count: 8
classes_count: 12
suites_count: 3

data_types:
  accepts:
    - "any"
    - "entry"
    - "location specifier"
    - "person"
    - "record"
    - "specifier"
    - "type"
  produces:
    - "any"
    - "boolean"
    - "person"
    - "specifier"
    - "text"

suites:
  - name: "Standard Suite"
    description: "Common classes and commands for all applications."
    commands:
      - name: "make"
        description: "Create a new object."
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
            type: "location specifier"
            optional: true
          - name: "with data"
            type: "any"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
  - name: "Contacts Script Suite"
    description: "commands and classes for Contacts scripting."
    commands:
      - name: "add"
        description: "Add a child object."
        direct_parameter:
          type: "entry"
          optional: false
        parameters:
          - name: "to"
            type: "specifier"
            optional: false
        result:
          type: "person"
      - name: "remove"
        description: "Remove a child object."
        direct_parameter:
          type: "entry"
          optional: false
        parameters:
          - name: "from"
            type: "specifier"
            optional: false
        result:
          type: "person"
      - name: "save"
        description: "Save all Contacts changes. Also see the unsaved property for the application class."
        result:
          type: "any"
    classes:
      - name: "address"
        description: "Address for the given record."
        properties:
          - name: "city"
            type: ""
            access: "rw"
          - name: "formatted address"
            type: ""
            access: "r"
          - name: "street"
            type: ""
            access: "rw"
          - name: "id"
            type: ""
            access: "rw"
          - name: "zip"
            type: ""
            access: "rw"
          - name: "country"
            type: ""
            access: "rw"
          - name: "label"
            type: ""
            access: "rw"
          - name: "country code"
            type: ""
            access: "rw"
          - name: "state"
            type: ""
            access: "rw"
      - name: "contact info"
        description: "Container object in the database, holds a key and a value"
        properties:
          - name: "label"
            type: ""
            access: "rw"
          - name: "value"
            type: ""
            access: "rw"
          - name: "id"
            type: ""
            access: "r"
      - name: "custom date"
        description: "Arbitrary date associated with this person."
        inherits: "contact info"
      - name: "email"
        description: "Email address for a person."
        inherits: "contact info"
      - name: "entry"
        description: "An entry in the address book database"
        properties:
          - name: "modification date"
            type: "date"
            access: "r"
          - name: "creation date"
            type: "date"
            access: "r"
          - name: "id"
            type: ""
            access: "r"
          - name: "selected"
            type: "boolean"
            access: "rw"
      - name: "group"
        description: "A Group Record in the address book database"
        inherits: "entry"
        properties:
          - name: "name"
            type: ""
            access: "rw"
        elements:
          - "group"
          - "person"
      - name: "instant message"
        description: "Address for instant messaging."
        inherits: "contact info"
        properties:
          - name: "service name"
            type: ""
            access: "r"
          - name: "service type"
            type: ""
            access: "rw"
          - name: "user name"
            type: ""
            access: "rw"
      - name: "person"
        description: "A person in the address book database."
        inherits: "entry"
        properties:
          - name: "nickname"
            type: ""
            access: "rw"
          - name: "organization"
            type: ""
            access: "rw"
          - name: "maiden name"
            type: ""
            access: "rw"
          - name: "suffix"
            type: ""
            access: "rw"
          - name: "vcard"
            type: ""
            access: "r"
          - name: "home page"
            type: ""
            access: "rw"
          - name: "birth date"
            type: ""
            access: "rw"
          - name: "phonetic last name"
            type: ""
            access: "rw"
          - name: "title"
            type: ""
            access: "rw"
          - name: "phonetic middle name"
            type: ""
            access: "rw"
          - name: "department"
            type: ""
            access: "rw"
          - name: "image"
            type: ""
            access: "rw"
          - name: "name"
            type: ""
            access: "r"
          - name: "note"
            type: ""
            access: "rw"
          - name: "company"
            type: "boolean"
            access: "rw"
          - name: "middle name"
            type: ""
            access: "rw"
          - name: "phonetic first name"
            type: ""
            access: "rw"
          - name: "job title"
            type: ""
            access: "rw"
          - name: "last name"
            type: ""
            access: "rw"
          - name: "first name"
            type: ""
            access: "rw"
        elements:
          - "MSN handle"
          - "url"
          - "address"
          - "phone"
          - "Jabber handle"
          - "group"
          - "custom date"
          - "AIM Handle"
          - "Yahoo handle"
          - "ICQ handle"
          - "instant message"
          - "social profile"
          - "related name"
          - "email"
      - name: "phone"
        description: "Phone number for a person."
        inherits: "contact info"
      - name: "related name"
        description: "Other names related to this person."
        inherits: "contact info"
      - name: "social profile"
        description: "Profile for social networks."
        properties:
          - name: "id"
            type: ""
            access: "r"
          - name: "service name"
            type: ""
            access: "rw"
          - name: "user name"
            type: ""
            access: "rw"
          - name: "user identifier"
            type: ""
            access: "rw"
          - name: "url"
            type: ""
            access: "rw"
      - name: "url"
        description: "URLs for this person."
        inherits: "contact info"
  - name: "Address Book Rollover Suite"
    description: "These event definitions are used for constructing Address Book Rollover plug-ins. They would not normally appear in a typical end user script."
    commands:
      - name: "action property"
        description: "RollOver - Which property this roll over is associated with (Properties can be one of maiden name, phone, email, url, birth date, custom date, related name, aim, icq, jabber, msn, yahoo, address.)"
        result:
          type: "text"
      - name: "action title"
        description: "RollOver - Returns the title that will be placed in the menu for this roll over"
        parameters:
          - name: "with"
            type: "any"
            optional: false
          - name: "for"
            type: "person"
            optional: false
        result:
          type: "text"
      - name: "perform action"
        description: "RollOver - Performs the action on the given person and value"
        parameters:
          - name: "with"
            type: "any"
            optional: false
          - name: "for"
            type: "person"
            optional: false
        result:
          type: "boolean"
      - name: "should enable action"
        description: "RollOver - Determines if the rollover action should be enabled for the given person and value"
        parameters:
          - name: "with"
            type: "any"
            optional: false
          - name: "for"
            type: "person"
            optional: false
        result:
          type: "boolean"