# Keynote Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Keynote" to <command>

app: "Keynote"
slug: "keynote"
commands_count: 28
classes_count: 22
suites_count: 4

data_types:
  accepts:
    - "NMSD"
    - "any"
    - "boolean"
    - "column"
    - "document"
    - "export format"
    - "export options"
    - "file"
    - "legacy chart grouping"
    - "legacy chart type"
    - "location specifier"
    - "range"
    - "record"
    - "slide"
    - "slide layout"
    - "specifier"
    - "table"
    - "text"
    - "type"
  produces:
    - "any"
    - "specifier"

suites:
  - name: "Keynote Suite"
    description: "Classes and commands for Keynote."
    commands:
      - name: "export"
        description: "Export a slideshow to another file"
        direct_parameter:
          type: "document"
          optional: false
        parameters:
          - name: "to"
            type: "file"
            optional: false
          - name: "as"
            type: "export format"
            optional: false
          - name: "with properties"
            type: "export options"
            optional: true
      - name: "duplicate"
        description: "Copy an object."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
      - name: "get"
        description: "Returns the value of the specified object(s)."
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "any"
    classes:
      - name: "slide layout"
        description: "A slide layout in a theme or slideshow document"
        inherits: "slide"
        properties:
          - name: "name"
            type: "text"
            access: "r"
      - name: "slide"
        description: "A slide in a slideshow document"
        inherits: "iWork container"
        properties:
          - name: "base layout"
            type: "slide layout"
            access: "rw"
          - name: "body showing"
            type: "boolean"
            access: "rw"
          - name: "skipped"
            type: "boolean"
            access: "rw"
          - name: "slide number"
            type: "integer"
            access: "r"
          - name: "title showing"
            type: "boolean"
            access: "rw"
          - name: "default body item"
            type: "shape"
            access: "r"
          - name: "default title item"
            type: "shape"
            access: "r"
          - name: "presenter notes"
            type: "rich text"
            access: "rw"
          - name: "transition properties"
            type: "transition settings"
            access: "rw"
      - name: "theme"
        description: "A collection of slide layouts, with shared design intents and elements."
        properties:
          - name: "id"
            type: "text"
            access: "r"
          - name: "name"
            type: "text"
            access: "r"
  - name: "iWork Text Suite"
    description: "Classes and commands for iWorks text objects."
    classes:
