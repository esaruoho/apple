            access: "rw"
          - name: "authentication"
            type: "Authentication"
            access: "rw"
          - name: "account type"
            type: "TypeOfAccount"
            access: "r"
          - name: "email addresses"
            type: ""
            access: "rw"
          - name: "full name"
            type: "text"
            access: "rw"
          - name: "empty junk messages frequency"
            type: "integer"
            access: "rw"
          - name: "empty trash frequency"
