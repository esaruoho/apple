        inherits: "account"
        properties:
          - name: "compact mailboxes when closing"
            type: "boolean"
            access: "rw"
          - name: "message caching"
            type: "MessageCachingPolicy"
            access: "rw"
          - name: "store drafts on server"
            type: "boolean"
            access: "rw"
          - name: "store junk mail on server"
            type: "boolean"
            access: "rw"
          - name: "store sent messages on server"
            type: "boolean"
            access: "rw"
          - name: "store deleted messages on server"
            type: "boolean"
            access: "rw"
