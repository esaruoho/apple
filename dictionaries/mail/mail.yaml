# Mail Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "Mail" to <command>

app: "Mail"
slug: "mail"
commands_count: 16
classes_count: 25
suites_count: 4

data_types:
  accepts:
    - "account"
    - "boolean"
    - "file"
    - "location specifier"
    - "mailbox"
    - "message"
    - "outgoing message"
    - "record"
    - "rule"
    - "specifier"
    - "text"
  produces:
    - "boolean"
    - "outgoing message"
    - "text"

suites:
  - name: "Standard Suite"
    description: "Common classes and commands for all applications."
    commands:
      - name: "delete"
        description: "Delete an object."
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "duplicate"
        description: "Copy an object."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
      - name: "move"
        description: "Move an object to a new location."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: false
  - name: "Text Suite"
    description: "A set of basic classes for text processing."
    classes:
      - name: "rich text"
        description: "Rich (styled) text"
        properties:
          - name: "color"
            type: "RGB color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "number"
            access: "rw"
        elements:
          - "paragraph"
          - "word"
          - "character"
          - "attribute run"
          - "attachment"
      - name: "attachment"
        description: "Represents an inline text attachment. This class is used mainly for make commands."
        inherits: "rich text"
        properties:
          - name: "file name"
            type: "file"
            access: "rw"
      - name: "paragraph"
        description: "This subdivides the text into paragraphs."
        properties:
          - name: "color"
            type: "RGB color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "number"
            access: "rw"
        elements:
          - "word"
          - "character"
          - "attribute run"
          - "attachment"
      - name: "word"
        description: "This subdivides the text into words."
        properties:
          - name: "color"
            type: "RGB color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "number"
            access: "rw"
        elements:
          - "character"
          - "attribute run"
          - "attachment"
      - name: "character"
        description: "This subdivides the text into characters."
        properties:
          - name: "color"
            type: "RGB color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "number"
            access: "rw"
        elements:
          - "attribute run"
          - "attachment"
      - name: "attribute run"
        description: "This subdivides the text into chunks that all have the same attributes."
        properties:
          - name: "color"
            type: "RGB color"
            access: "rw"
          - name: "font"
            type: "text"
            access: "rw"
          - name: "size"
            type: "number"
            access: "rw"
        elements:
          - "paragraph"
          - "word"
          - "character"
          - "attachment"
  - name: "Mail"
    description: "Classes and commands for the Mail application"
    commands:
      - name: "bounce"
        description: "Does nothing at all (deprecated)"
        direct_parameter:
          type: "message"
          optional: false
      - name: "check for new mail"
        description: "Triggers a check for email."
        parameters:
          - name: "for"
            type: "account"
            optional: true
      - name: "extract name from"
        description: "Command to get the full name out of a fully specified email address. E.g. Calling this with "John Doe <jdoe@example.com>" as the direct object would return "John Doe""
        direct_parameter:
          type: "text"
          optional: false
        result:
          type: "text"
      - name: "extract address from"
        description: "Command to get just the email address of a fully specified email address. E.g. Calling this with "John Doe <jdoe@example.com>" as the direct object would return "jdoe@example.com""
        direct_parameter:
          type: "text"
          optional: false
        result:
          type: "text"
      - name: "forward"
        description: "Creates a forwarded message."
        direct_parameter:
          type: "message"
          optional: false
        parameters:
          - name: "opening window"
            type: "boolean"
            optional: true
        result:
          type: "outgoing message"
      - name: "GetURL"
        description: "Opens a mailto URL."
        direct_parameter:
          type: "text"
          optional: false
      - name: "import Mail mailbox"
        description: "Imports a mailbox created by Mail."
        parameters:
          - name: "at"
            type: "file"
            optional: false
      - name: "mailto"
        description: "Opens a mailto URL."
        direct_parameter:
          type: "text"
          optional: false
      - name: "perform mail action with messages"
        description: "Script handler invoked by rules and menus that execute AppleScripts. The direct parameter of this handler is a list of messages being acted upon."
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "in mailboxes"
            type: "mailbox"
            optional: true
          - name: "for rule"
            type: "rule"
            optional: true
      - name: "redirect"
        description: "Creates a redirected message."
        direct_parameter:
          type: "message"
          optional: false
        parameters:
          - name: "opening window"
            type: "boolean"
            optional: true
        result:
          type: "outgoing message"
      - name: "reply"
        description: "Creates a reply message."
        direct_parameter:
          type: "message"
          optional: false
        parameters:
          - name: "opening window"
            type: "boolean"
            optional: true
          - name: "reply to all"
            type: "boolean"
            optional: true
        result:
          type: "outgoing message"
      - name: "send"
        description: "Sends a message."
        direct_parameter:
          type: "outgoing message"
          optional: false
        result:
          type: "boolean"
      - name: "synchronize"
        description: "Command to trigger synchronizing of an IMAP account with the server."
        parameters:
          - name: "with"
            type: "account"
            optional: false
    classes:
      - name: "outgoing message"
        description: "A new email message"
        properties:
          - name: "sender"
            type: "text"
            access: "rw"
          - name: "subject"
            type: "text"
            access: "rw"
          - name: "visible"
            type: "boolean"
            access: "rw"
          - name: "message signature"
            type: ""
            access: "rw"
          - name: "id"
            type: "integer"
            access: "r"
        elements:
          - "bcc recipient"
          - "cc recipient"
          - "recipient"
          - "to recipient"
      - name: "message viewer"
        description: "Represents the object responsible for managing a viewer window"
        properties:
          - name: "drafts mailbox"
            type: "mailbox"
            access: "r"
          - name: "inbox"
            type: "mailbox"
            access: "r"
          - name: "junk mailbox"
            type: "mailbox"
            access: "r"
          - name: "outbox"
            type: "mailbox"
            access: "r"
          - name: "sent mailbox"
            type: "mailbox"
            access: "r"
          - name: "trash mailbox"
            type: "mailbox"
            access: "r"
          - name: "sort column"
            type: "ViewerColumns"
            access: "rw"
          - name: "sorted ascending"
            type: "boolean"
            access: "rw"
          - name: "mailbox list visible"
            type: "boolean"
            access: "rw"
          - name: "preview pane is visible"
            type: "boolean"
            access: "rw"
          - name: "visible columns"
            type: ""
            access: "rw"
          - name: "id"
            type: "integer"
            access: "r"
          - name: "visible messages"
            type: ""
            access: "rw"
          - name: "selected messages"
            type: ""
            access: "rw"
          - name: "selected mailboxes"
            type: ""
            access: "rw"
        elements:
          - "message"
      - name: "signature"
        description: "Email signatures"
        properties:
          - name: "content"
            type: "text"
            access: "rw"
          - name: "name"
            type: "text"
            access: "rw"
  - name: "Mail Framework"
    description: "Classes and commands for the Mail framework"
    classes:
      - name: "message"
        description: "An email message"
        properties:
          - name: "id"
            type: "integer"
            access: "r"
          - name: "all headers"
            type: "text"
            access: "r"
          - name: "background color"
            type: "HighlightColors"
            access: "rw"
          - name: "mailbox"
            type: "mailbox"
            access: "rw"
          - name: "content"
            type: "rich text"
            access: "r"
          - name: "date received"
            type: "date"
            access: "r"
          - name: "date sent"
            type: "date"
            access: "r"
          - name: "deleted status"
            type: "boolean"
            access: "rw"
          - name: "flagged status"
            type: "boolean"
            access: "rw"
          - name: "flag index"
            type: "integer"
            access: "rw"
          - name: "junk mail status"
            type: "boolean"
            access: "rw"
          - name: "read status"
            type: "boolean"
            access: "rw"
          - name: "message id"
            type: "text"
            access: "r"
          - name: "source"
            type: "text"
            access: "r"
          - name: "reply to"
            type: "text"
            access: "r"
          - name: "message size"
            type: "integer"
            access: "r"
          - name: "sender"
            type: "text"
            access: "r"
          - name: "subject"
            type: "text"
            access: "r"
          - name: "was forwarded"
            type: "boolean"
            access: "r"
          - name: "was redirected"
            type: "boolean"
            access: "r"
          - name: "was replied to"
            type: "boolean"
            access: "r"
        elements:
          - "bcc recipient"
          - "cc recipient"
          - "recipient"
          - "to recipient"
          - "header"
          - "mail attachment"
      - name: "account"
        description: "A Mail account for receiving messages (POP/IMAP). To create a new receiving account, use the 'pop account', 'imap account', and 'iCloud account' objects"
        properties:
          - name: "delivery account"
            type: ""
