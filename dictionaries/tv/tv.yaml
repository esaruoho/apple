# TV Scripting Dictionary
# Extracted via: sdef | sdef-extract.py
# Usage: tell application "TV" to <command>

app: "TV"
slug: "tv"
commands_count: 29
classes_count: 16
suites_count: 3

data_types:
  accepts:
    - "boolean"
    - "eSrA"
    - "file track"
    - "item"
    - "location specifier"
    - "playlist"
    - "record"
    - "specifier"
    - "text"
    - "type"
  produces:
    - "boolean"
    - "integer"
    - "specifier"
    - "track"

suites:
  - name: "Standard Suite"
    description: "Common terms for most applications"
    commands:
      - name: "close"
        description: "Close an object"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "count"
        description: "Return the number of elements of a particular class within an object"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "each"
            type: "type"
            optional: false
        result:
          type: "integer"
      - name: "delete"
        description: "Delete an element from an object"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "duplicate"
        description: "Duplicate one or more object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
        result:
          type: "specifier"
      - name: "exists"
        description: "Verify if an object exists"
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "boolean"
      - name: "make"
        description: "Make a new element"
        parameters:
          - name: "new"
            type: "type"
            optional: false
          - name: "at"
            type: "location specifier"
            optional: true
          - name: "with properties"
            type: "record"
            optional: true
        result:
          type: "specifier"
      - name: "move"
        description: "Move playlist(s) to a new location"
        direct_parameter:
          type: "playlist"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: false
      - name: "open"
        description: "Open the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "run"
        description: "Run the application"
      - name: "quit"
        description: "Quit the application"
      - name: "save"
        description: "Save the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
  - name: "TV Suite"
    description: "The event suite specific to TV"
    commands:
      - name: "add"
        description: "add one or more files to a playlist"
        direct_parameter:
          type: "specifier"
          optional: false
        parameters:
          - name: "to"
            type: "location specifier"
            optional: true
        result:
          type: "track"
      - name: "back track"
        description: "reposition to beginning of current track or go to previous track if already at start of current track"
      - name: "convert"
        description: "convert one or more files or tracks"
        direct_parameter:
          type: "specifier"
          optional: false
        result:
          type: "track"
      - name: "download"
        description: "download a cloud track or playlist"
        direct_parameter:
          type: "item"
          optional: false
      - name: "fast forward"
        description: "skip forward in a playing track"
      - name: "next track"
        description: "advance to the next track in the current playlist"
      - name: "pause"
        description: "pause playback"
      - name: "play"
        description: "play the current track or the specified track or file."
        direct_parameter:
          type: "specifier"
          optional: true
        parameters:
          - name: "once"
            type: "boolean"
            optional: true
      - name: "playpause"
        description: "toggle the playing/paused state of the current track"
      - name: "previous track"
        description: "return to the previous track in the current playlist"
      - name: "refresh"
        description: "update file track information from the current information in the track’s file"
        direct_parameter:
          type: "file track"
          optional: false
      - name: "resume"
        description: "disable fast forward/rewind and resume playback, if playing."
      - name: "reveal"
        description: "reveal and select a track or playlist"
        direct_parameter:
          type: "item"
          optional: false
      - name: "rewind"
        description: "skip backwards in a playing track"
      - name: "search"
        description: "search a playlist for tracks matching the search string. Identical to entering search text in the Search field."
        direct_parameter:
          type: "playlist"
          optional: false
        parameters:
          - name: "for"
            type: "text"
            optional: false
          - name: "only"
            type: "eSrA"
            optional: true
        result:
          type: "track"
      - name: "select"
        description: "select the specified object(s)"
        direct_parameter:
          type: "specifier"
          optional: false
      - name: "stop"
        description: "stop playback"
    classes:
      - name: "application"
        description: "The application program"
        properties:
          - name: "current playlist"
            type: "playlist"
            access: "r"
          - name: "current stream title"
            type: "text"
            access: "r"
          - name: "current stream URL"
            type: "text"
            access: "r"
          - name: "current track"
            type: "track"
            access: "r"
          - name: "fixed indexing"
            type: "boolean"
            access: "rw"
          - name: "frontmost"
            type: "boolean"
            access: "rw"
          - name: "full screen"
            type: "boolean"
            access: "rw"
          - name: "name"
            type: "text"
            access: "r"
          - name: "mute"
            type: "boolean"
            access: "rw"
          - name: "player position"
            type: "real"
            access: "rw"
          - name: "player state"
            type: "ePlS"
            access: "r"
          - name: "selection"
            type: "specifier"
            access: "r"
          - name: "sound volume"
            type: "integer"
            access: "rw"
          - name: "version"
            type: "text"
            access: "r"
        elements:
          - "browser window"
          - "playlist"
          - "playlist window"
          - "source"
          - "track"
          - "video window"
          - "window"
      - name: "artwork"
        description: "a piece of art within a track or playlist"
        inherits: "item"
        properties:
          - name: "data"
            type: "picture"
            access: "rw"
          - name: "description"
            type: "text"
