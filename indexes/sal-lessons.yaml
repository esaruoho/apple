version: 1
updated: "2026-04-01"

lesson_schema:
  description: "Machine-readable lesson index connecting preserved Sal source pages to curriculum tracks and modern equivalents in this repo."
  required_fields:
    - id
    - title
    - track
    - level
    - category
    - source_site
    - source_page
    - source_status
    - goal
    - allows
    - modern_equivalent

tracks:
  foundations:
    label: "Foundations"
  workflow-building:
    label: "Workflow Building"
  app-automation:
    label: "App Automation"
  accessibility-voice:
    label: "Accessibility And Voice"
  admin-deployment:
    label: "Admin And Deployment"
  modern-translation:
    label: "Modern Translation Layer"

