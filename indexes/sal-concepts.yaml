functions:
  - slug: activate-app
    name: "Activate app"
    summary: "Bring an application to the foreground with AppleScript."
    patterns:
      - "tell application \"AppName\" to activate"
    related_concepts: ["applescript-depth"]
    related_apps: ["finder", "mail", "music", "script-editor"]
  - slug: ui-script-menu
    name: "UI script menu path"
    summary: "Use System Events to click menus, buttons, and controls in otherwise dark apps."
    patterns:
      - "tell application \"System Events\""
      - "click menu item"
    related_concepts: ["system-events-ui-scripting"]
    related_apps: ["system-events", "system-settings"]
  - slug: pass-document-between-apps
    name: "Pass document between apps"
    summary: "Use shared data types and exported files to chain scripts across applications."
    patterns:
      - "save"
      - "open"
      - "make new"
    related_concepts: ["iwork-document-automation", "photos-library-automation"]
    related_apps: ["keynote", "numbers", "pages", "photos", "finder"]
